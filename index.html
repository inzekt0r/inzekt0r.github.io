<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="terminal-container">
        <!-- Terminal Header im Stil von macOS/Linux -->
        <div class="terminal-header">
            <span class="btn red"></span>
            <span class="btn yellow"></span>
            <span class="btn green"></span>
            <div class="title">gast@github-pages:~</div>
        </div>
        <!-- Terminal Inhalt -->
        <div class="terminal-body" id="terminal-body">
            <div class="output">Willkommen auf meiner Terminal-Webseite!</div>
            <div class="output">Tippe <span class="highlight">help</span> ein und drücke Enter, um eine Liste der verfügbaren Befehle anzuzeigen.</div>
            <br>
            <div id="history"></div>
            <!-- Eingabezeile -->
            <div class="input-line">
                <span class="prompt">gast@terminal:~$</span>
                <input type="text" id="command-input" autofocus autocomplete="off" spellcheck="false">
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
