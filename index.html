<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacker OS - Interactive Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Retro-Röhrenmonitor-Effekt (Scanlines) -->
    <div class="scanlines"></div>

    <div class="hud-container">
        <!-- Header Statusleiste -->
        <header class="hud-header">
            <div class="status-item"><span class="label">SYSTEM:</span> <span class="value online">ONLINE</span></div>
            <div class="status-item"><span class="label">SECURE_CONN:</span> <span class="value cyan">ACTIVE</span></div>
            <div class="status-item"><span class="label">USER:</span> <span class="value">GUEST_PROT</span></div>
        </header>

        <!-- Hauptbereich (Split-Screen) -->
        <main class="hud-main">
            <!-- Navigationsmenü (als Dateisystem getarnt) -->
            <nav class="hud-nav">
                <div class="nav-title">FILE_SYSTEM //</div>
                <button class="nav-btn active" data-target="welcome">
                    <span class="icon">></span> README.txt
                </button>
                <button class="nav-btn" data-target="about">
                    <span class="icon">></span> ABOUT_ME.usr
                </button>
                <button class="nav-btn" data-target="projects">
                    <span class="icon">></span> PROJECTS.log
                </button>
                <button class="nav-btn" data-target="skills">
                    <span class="icon">></span> SKILLS.sys
                </button>
                <button class="nav-btn" data-target="contact">
                    <span class="icon">></span> CONTACT.cfg
                </button>
            </nav>

            <!-- Terminal Ausgabe-Bildschirm -->
            <section class="hud-monitor">
                <div class="monitor-header">
                    <span class="terminal-title">TERMINAL://MONITOR_01</span>
                    <div class="window-controls">
                        <span class="dot"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                    </div>
                </div>
                <div class="monitor-content" id="output-screen">
                    <!-- Inhalt wird durch JS geladen -->
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="hud-footer">
            <div>SYS_PORT: 8080</div>
            <div class="blink">■ CURSOR_ACTIVE</div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
